<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Exam Annotator</title>
<style>
  /* ===== RESET & BASE ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --accent: #4f8ef7;
    --accent2: #7c3aed;
    --red: #ef4444;
    --blue: #3b82f6;
    --black: #1a1a1a;
    --green: #22c55e;
    --text: #e8eaf0;
    --muted: #6b7280;
    --border: rgba(255,255,255,0.08);
    --shadow: 0 8px 32px rgba(0,0,0,0.5);
    --toolbar-h: 64px;
    --radius: 14px;
    --font: 'Segoe UI', system-ui, sans-serif;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ===== ROTATE OVERLAY ===== */
  #rotate-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 9999;
    background: linear-gradient(135deg, #0f1117 0%, #1a1d27 100%);
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px;
    text-align: center;
    padding: 40px;
  }
  #rotate-overlay .rotate-icon {
    font-size: 72px;
    animation: rotateHint 2s ease-in-out infinite;
  }
  @keyframes rotateHint {
    0%,100% { transform: rotate(0deg); }
    40% { transform: rotate(-90deg); }
    60% { transform: rotate(-90deg); }
  }
  #rotate-overlay h2 { font-size: 22px; font-weight: 700; color: var(--text); }
  #rotate-overlay p { font-size: 14px; color: var(--muted); line-height: 1.6; }

  /* ===== UPLOAD SCREEN ===== */
  #upload-screen {
    position: fixed; inset: 0; z-index: 100;
    background: linear-gradient(135deg, #0f1117 0%, #1a1d27 60%, #0d0f1a 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 32px; padding: 24px;
  }
  .upload-logo {
    font-size: 48px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 900;
    letter-spacing: -2px;
  }
  .upload-title { font-size: 26px; font-weight: 800; text-align: center; }
  .upload-sub { font-size: 14px; color: var(--muted); text-align: center; line-height: 1.6; }
  
  .upload-zone {
    width: 100%; max-width: 400px;
    border: 2px dashed rgba(79,142,247,0.4);
    border-radius: 20px;
    padding: 40px 24px;
    display: flex; flex-direction: column;
    align-items: center; gap: 16px;
    cursor: pointer;
    background: rgba(79,142,247,0.04);
    transition: all 0.2s;
    position: relative;
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: rgba(79,142,247,0.1);
  }
  .upload-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0;
    cursor: pointer; width: 100%; height: 100%;
  }
  .upload-icon { font-size: 48px; }
  .upload-zone-text { font-size: 15px; font-weight: 600; color: var(--text); }
  .upload-zone-hint { font-size: 12px; color: var(--muted); }
  
  .upload-btn {
    width: 100%; max-width: 400px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 14px;
    color: white; font-size: 16px; font-weight: 700;
    padding: 16px; cursor: pointer;
    transition: opacity 0.2s;
  }
  .upload-btn:hover { opacity: 0.9; }

  /* ===== MAIN APP ===== */
  #app {
    display: none;
    position: fixed; inset: 0;
    flex-direction: column;
    background: var(--bg);
  }
  #app.active { display: flex; }

  /* ===== TOOLBAR ===== */
  #toolbar {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: var(--toolbar-h);
    background: rgba(26, 29, 39, 0.96);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 8px; gap: 4px;
    z-index: 500;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  #toolbar::-webkit-scrollbar { display: none; }

  .tb-group {
    display: flex; align-items: center; gap: 3px;
    flex-shrink: 0;
  }
  .tb-divider {
    width: 1px; height: 32px;
    background: var(--border);
    margin: 0 4px; flex-shrink: 0;
  }

  .tb-btn {
    width: 48px; height: 48px;
    border-radius: 12px;
    border: none; background: transparent;
    color: var(--muted);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 2px; cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
    font-size: 20px;
    position: relative;
  }
  .tb-btn span.label {
    font-size: 9px; font-weight: 600;
    letter-spacing: 0.3px; color: inherit;
  }
  .tb-btn:hover { background: rgba(255,255,255,0.06); }
  .tb-btn.active {
    background: rgba(79,142,247,0.2);
    color: var(--accent);
    box-shadow: 0 0 0 1px rgba(79,142,247,0.3);
  }
  .tb-btn.danger { color: var(--red); }
  .tb-btn.danger:hover { background: rgba(239,68,68,0.1); }
  .tb-btn.success { color: var(--green); }
  .tb-btn.success:hover { background: rgba(34,197,94,0.1); }

  /* Color buttons */
  .color-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 3px solid transparent;
    cursor: pointer; flex-shrink: 0;
    transition: all 0.15s;
  }
  .color-btn.active { border-color: white; transform: scale(1.15); }
  .color-btn.red { background: #ef4444; }
  .color-btn.blue { background: #3b82f6; }
  .color-btn.black { background: #1a1a1a; border: 3px solid #444; }
  .color-btn.black.active { border-color: white; }
  .color-btn.green { background: #22c55e; }

  /* Size slider */
  .size-wrap {
    display: flex; align-items: center; gap: 6px;
    flex-shrink: 0; padding: 0 4px;
  }
  .size-wrap label { font-size: 9px; color: var(--muted); font-weight: 600; }
  #sizeSlider {
    -webkit-appearance: none;
    width: 60px; height: 4px;
    border-radius: 2px;
    background: var(--surface2);
    outline: none;
  }
  #sizeSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  /* ===== CANVAS AREA ===== */
  #canvas-area {
    position: fixed;
    top: 0; left: 0;
    right: 0;
    bottom: var(--toolbar-h);
    overflow: hidden;
    background: #2a2a35;
    touch-action: none;
  }

  #transform-wrapper {
    position: absolute;
    top: 0; left: 0;
    transform-origin: 0 0;
    /* transform set by JS */
  }

  #bg-canvas {
    display: block;
    /* size set by JS */
  }

  #draw-canvas {
    position: absolute;
    top: 0; left: 0;
    display: block;
    cursor: crosshair;
    /* size = bg-canvas */
  }

  /* ===== LOADING ===== */
  #loading {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    background: rgba(15,17,23,0.85);
    backdrop-filter: blur(8px);
    align-items: center; justify-content: center;
    flex-direction: column; gap: 16px;
  }
  #loading.show { display: flex; }
  .spinner {
    width: 44px; height: 44px;
    border: 3px solid rgba(79,142,247,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { font-size: 14px; color: var(--muted); }

  /* ===== TOAST ===== */
  #toast {
    position: fixed; bottom: 80px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(26,29,39,0.95);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 13px; font-weight: 600;
    color: var(--text);
    opacity: 0;
    transition: all 0.3s;
    z-index: 600;
    white-space: nowrap;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ===== SIZE INDICATOR ===== */
  #size-indicator {
    position: fixed;
    bottom: calc(var(--toolbar-h) + 12px);
    right: 12px;
    background: rgba(26,29,39,0.9);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--muted);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 400;
  }
  #size-indicator.show { opacity: 1; }

  /* ===== HOME BTN ===== */
  #home-btn {
    position: fixed;
    top: 10px; right: 10px;
    width: 36px; height: 36px;
    border-radius: 10px;
    background: rgba(26,29,39,0.9);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 400;
    transition: all 0.15s;
  }
  #home-btn:hover { color: var(--text); background: var(--surface2); }

  /* ===== PDF NAVIGATION ===== */
  #pdf-nav {
    display: none;
    position: fixed;
    top: 10px; left: 50%;
    transform: translateX(-50%);
    background: rgba(26,29,39,0.9);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px 12px;
    display: none; align-items: center; gap: 10px;
    z-index: 400;
  }
  #pdf-nav.visible { display: flex; }
  #pdf-nav button {
    background: none; border: none;
    color: var(--text); font-size: 16px;
    cursor: pointer; padding: 2px 6px;
    border-radius: 6px; transition: background 0.15s;
  }
  #pdf-nav button:hover { background: var(--surface2); }
  #pdf-nav button:disabled { color: var(--muted); cursor: default; }
  #pdf-nav span { font-size: 13px; color: var(--muted); min-width: 60px; text-align: center; }

</style>
</head>
<body>

<!-- ROTATE OVERLAY -->
<div id="rotate-overlay">
  <div class="rotate-icon">📱</div>
  <h2>Xoay ngang màn hình</h2>
  <p>Ứng dụng hoạt động tốt nhất ở chế độ ngang.<br>Vui lòng xoay điện thoại của bạn.</p>
</div>

<!-- UPLOAD SCREEN -->
<div id="upload-screen">
  <div class="upload-logo">✏️ ExamDraw</div>
  <div>
    <div class="upload-title">Làm bài thi trực tiếp</div>
    <div class="upload-sub">Upload đề thi và bắt đầu làm bài ngay<br>Hỗ trợ ảnh JPG, PNG và PDF</div>
  </div>
  
  <div class="upload-zone" id="upload-zone">
    <input type="file" id="file-input" accept="image/*,.pdf" />
    <div class="upload-icon">📄</div>
    <div class="upload-zone-text">Chọn file đề thi</div>
    <div class="upload-zone-hint">JPG, PNG, PDF • Kéo thả vào đây</div>
  </div>

  <button class="upload-btn" onclick="document.getElementById('file-input').click()">
    📂 Chọn đề thi
  </button>
</div>

<!-- LOADING -->
<div id="loading">
  <div class="spinner"></div>
  <p>Đang tải đề thi...</p>
</div>

<!-- MAIN APP -->
<div id="app">
  <!-- Home button -->
  <button id="home-btn" onclick="goHome()" title="Tải đề mới">🏠</button>

  <!-- PDF Navigation -->
  <div id="pdf-nav">
    <button id="pdf-prev" onclick="changePage(-1)">◀</button>
    <span id="pdf-page-info">1 / 1</span>
    <button id="pdf-next" onclick="changePage(1)">▶</button>
  </div>

  <!-- Canvas Area -->
  <div id="canvas-area">
    <div id="transform-wrapper">
      <canvas id="bg-canvas"></canvas>
      <canvas id="draw-canvas"></canvas>
    </div>
  </div>

  <!-- Toolbar -->
  <div id="toolbar">
    <!-- Tools -->
    <div class="tb-group">
      <button class="tb-btn active" id="btn-pen" onclick="setTool('pen')" title="Bút vẽ">
        ✏️<span class="label">Bút</span>
      </button>
      <button class="tb-btn" id="btn-circle" onclick="setTool('circle')" title="Khoanh tròn">
        ⭕<span class="label">Tròn</span>
      </button>
      <button class="tb-btn" id="btn-eraser" onclick="setTool('eraser')" title="Tẩy">
        🧹<span class="label">Tẩy</span>
      </button>
    </div>

    <div class="tb-divider"></div>

    <!-- Colors -->
    <div class="tb-group">
      <div class="color-btn red active" id="color-red" onclick="setColor('#ef4444', this)" title="Đỏ"></div>
      <div class="color-btn blue" id="color-blue" onclick="setColor('#3b82f6', this)" title="Xanh"></div>
      <div class="color-btn black" id="color-black" onclick="setColor('#1a1a1a', this)" title="Đen"></div>
      <div class="color-btn green" id="color-green" onclick="setColor('#22c55e', this)" title="Xanh lá"></div>
    </div>

    <div class="tb-divider"></div>

    <!-- Size -->
    <div class="size-wrap">
      <label>NÉT</label>
      <input type="range" id="sizeSlider" min="1" max="20" value="3" oninput="setSize(this.value)">
    </div>

    <div class="tb-divider"></div>

    <!-- History -->
    <div class="tb-group">
      <button class="tb-btn" id="btn-undo" onclick="undo()" title="Hoàn tác">
        ↩️<span class="label">Undo</span>
      </button>
      <button class="tb-btn" id="btn-redo" onclick="redo()" title="Làm lại">
        ↪️<span class="label">Redo</span>
      </button>
    </div>

    <div class="tb-divider"></div>

    <!-- Actions -->
    <div class="tb-group">
      <button class="tb-btn danger" onclick="clearCanvas()" title="Xóa hết">
        🗑️<span class="label">Xóa</span>
      </button>
      <button class="tb-btn success" onclick="saveImage()" title="Lưu ảnh">
        💾<span class="label">Lưu</span>
      </button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>
<!-- Size indicator -->
<div id="size-indicator" id="size-indicator"></div>

<!-- PDF.js CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
// =============================================
// GLOBAL STATE
// =============================================
const state = {
  tool: 'pen',        // pen | circle | eraser
  color: '#ef4444',
  size: 3,
  isDrawing: false,
  lastX: 0, lastY: 0,
  // Circle tool
  circleStart: null,
  circlePreview: null,
  // Zoom & Pan
  scale: 1,
  panX: 0, panY: 0,
  // Touch
  lastTouchDist: 0,
  lastTouchMid: null,
  isPanning: false,
  // History
  history: [],
  historyIndex: -1,
  maxHistory: Infinity,
  // PDF
  pdfDoc: null,
  currentPage: 1,
  totalPages: 1,
  // Canvas dimensions (logical)
  canvasW: 0,
  canvasH: 0,
};

// =============================================
// DOM ELEMENTS
// =============================================
const bgCanvas    = document.getElementById('bg-canvas');
const drawCanvas  = document.getElementById('draw-canvas');
const bgCtx       = bgCanvas.getContext('2d');
const drawCtx     = drawCanvas.getContext('2d');
const wrapper     = document.getElementById('transform-wrapper');
const canvasArea  = document.getElementById('canvas-area');
const app         = document.getElementById('app');
const uploadScreen= document.getElementById('upload-screen');
const loading     = document.getElementById('loading');
const pdfNav      = document.getElementById('pdf-nav');
const sizeSlider  = document.getElementById('sizeSlider');

// =============================================
// ORIENTATION & FULLSCREEN
// =============================================
function checkOrientation() {
  const overlay = document.getElementById('rotate-overlay');
  const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
  if (!isMobile) { overlay.style.display = 'none'; return; }
  
  const isLandscape = window.innerWidth > window.innerHeight;
  overlay.style.display = isLandscape ? 'none' : 'flex';
}

// Try lock landscape
function tryLockLandscape() {
  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock('landscape').catch(() => {});
  }
}

window.addEventListener('orientationchange', () => {
  setTimeout(() => { checkOrientation(); fitCanvasToArea(); }, 300);
});
window.addEventListener('resize', () => {
  setTimeout(() => { checkOrientation(); fitCanvasToArea(); }, 100);
});

// Request fullscreen on first interaction
function requestFullscreen() {
  const el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen().catch(() => {});
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
}

// =============================================
// FILE UPLOAD
// =============================================
const fileInput = document.getElementById('file-input');
const uploadZone = document.getElementById('upload-zone');

// Drag & drop
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});

fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) handleFile(file);
});

async function handleFile(file) {
  loading.classList.add('show');
  try {
    if (file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf')) {
      await loadPDF(file);
    } else if (file.type.startsWith('image/')) {
      await loadImage(file);
    } else {
      showToast('⚠️ Chỉ hỗ trợ JPG, PNG, PDF');
      loading.classList.remove('show');
      return;
    }
    // Switch to app
    uploadScreen.style.display = 'none';
    app.classList.add('active');
    tryLockLandscape();
    requestFullscreen();
    checkOrientation();
    // Reset history
    state.history = [];
    state.historyIndex = -1;
    saveHistoryState();
    // Save to localStorage
    saveToStorage();
  } catch(err) {
    showToast('❌ Lỗi tải file: ' + err.message);
  }
  loading.classList.remove('show');
}

// =============================================
// LOAD IMAGE
// =============================================
async function loadImage(file) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      state.pdfDoc = null;
      pdfNav.classList.remove('visible');
      setupCanvases(img.width, img.height);
      bgCtx.drawImage(img, 0, 0);
      clearDrawCanvas();
      fitCanvasToArea();
      URL.revokeObjectURL(url);
      resolve();
    };
    img.onerror = reject;
    img.src = url;
  });
}

// =============================================
// LOAD PDF
// =============================================
async function loadPDF(file) {
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  
  const arrayBuffer = await file.arrayBuffer();
  state.pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  state.totalPages = state.pdfDoc.numPages;
  state.currentPage = 1;
  
  pdfNav.classList.add('visible');
  await renderPDFPage(state.currentPage);
  updatePDFNav();
}

async function renderPDFPage(pageNum) {
  if (!state.pdfDoc) return;
  const page = await state.pdfDoc.getPage(pageNum);
  const viewport = page.getViewport({ scale: 2.0 }); // High resolution
  
  setupCanvases(viewport.width, viewport.height);
  clearDrawCanvas();
  
  await page.render({ canvasContext: bgCtx, viewport }).promise;
  fitCanvasToArea();
}

async function changePage(delta) {
  const newPage = state.currentPage + delta;
  if (newPage < 1 || newPage > state.totalPages) return;
  loading.classList.add('show');
  state.currentPage = newPage;
  
  // Save current annotations
  const key = `page_${state.currentPage - delta}`;
  const dataURL = drawCanvas.toDataURL();
  localStorage.setItem(key, dataURL);
  
  await renderPDFPage(state.currentPage);
  
  // Load saved annotations if any
  const saved = localStorage.getItem(`page_${state.currentPage}`);
  if (saved) {
    const img = new Image();
    img.onload = () => drawCtx.drawImage(img, 0, 0);
    img.src = saved;
  }
  
  state.history = [];
  state.historyIndex = -1;
  saveHistoryState();
  updatePDFNav();
  loading.classList.remove('show');
}

function updatePDFNav() {
  document.getElementById('pdf-page-info').textContent =
    `${state.currentPage} / ${state.totalPages}`;
  document.getElementById('pdf-prev').disabled = state.currentPage <= 1;
  document.getElementById('pdf-next').disabled = state.currentPage >= state.totalPages;
}

// =============================================
// CANVAS SETUP & FIT
// =============================================
function setupCanvases(w, h) {
  state.canvasW = w;
  state.canvasH = h;
  bgCanvas.width  = w; bgCanvas.height  = h;
  drawCanvas.width = w; drawCanvas.height = h;
  wrapper.style.width  = w + 'px';
  wrapper.style.height = h + 'px';
}

function fitCanvasToArea() {
  const areaW = canvasArea.clientWidth;
  const areaH = canvasArea.clientHeight;
  if (!state.canvasW || !state.canvasH) return;
  
  const scaleW = areaW / state.canvasW;
  const scaleH = areaH / state.canvasH;
  const fitScale = Math.min(scaleW, scaleH);
  
  state.scale = fitScale;
  state.panX = (areaW - state.canvasW * fitScale) / 2;
  state.panY = (areaH - state.canvasH * fitScale) / 2;
  
  applyTransform();
}

function applyTransform() {
  wrapper.style.transform =
    `translate(${state.panX}px, ${state.panY}px) scale(${state.scale})`;
}

// =============================================
// TOOL MANAGEMENT
// =============================================
function setTool(tool) {
  state.tool = tool;
  // Update active buttons
  document.querySelectorAll('.tb-btn[id^="btn-"]').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('btn-' + tool);
  if (btn) btn.classList.add('active');
  
  drawCanvas.style.cursor = tool === 'eraser' ? 'cell' : 'crosshair';
}

function setColor(hex, el) {
  state.color = hex;
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function setSize(val) {
  state.size = parseInt(val);
  // Show indicator
  const ind = document.getElementById('size-indicator');
  ind.textContent = `Nét: ${val}px`;
  ind.classList.add('show');
  clearTimeout(window._sizeTimer);
  window._sizeTimer = setTimeout(() => ind.classList.remove('show'), 1500);
}

// =============================================
// COORDINATE CONVERSION
// =============================================
// Convert screen coords to canvas logical coords
function screenToCanvas(sx, sy) {
  const rect = canvasArea.getBoundingClientRect();
  return {
    x: (sx - rect.left - state.panX) / state.scale,
    y: (sy - rect.top  - state.panY) / state.scale,
  };
}

// =============================================
// DRAWING — MOUSE EVENTS
// =============================================
drawCanvas.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  e.preventDefault();
  const pos = screenToCanvas(e.clientX, e.clientY);
  startDraw(pos.x, pos.y);
});
drawCanvas.addEventListener('mousemove', e => {
  e.preventDefault();
  if (!state.isDrawing) return;
  const pos = screenToCanvas(e.clientX, e.clientY);
  continueDraw(pos.x, pos.y);
});
drawCanvas.addEventListener('mouseup',   e => { if (state.isDrawing) endDraw(); });
drawCanvas.addEventListener('mouseleave',e => { if (state.isDrawing) endDraw(); });

// =============================================
// DRAWING — TOUCH EVENTS
// =============================================
canvasArea.addEventListener('touchstart',  onTouchStart,  { passive: false });
canvasArea.addEventListener('touchmove',   onTouchMove,   { passive: false });
canvasArea.addEventListener('touchend',    onTouchEnd,    { passive: false });
canvasArea.addEventListener('touchcancel', onTouchEnd,    { passive: false });

function onTouchStart(e) {
  e.preventDefault();
  const touches = e.touches;

  if (touches.length === 1) {
    // Single finger: draw
    state.isPanning = false;
    const t = touches[0];
    const pos = screenToCanvas(t.clientX, t.clientY);
    startDraw(pos.x, pos.y);
  } else if (touches.length === 2) {
    // Two fingers: zoom/pan
    if (state.isDrawing) endDraw();
    state.isPanning = true;
    state.lastTouchDist = getTouchDist(touches);
    state.lastTouchMid  = getTouchMid(touches);
  }
}

function onTouchMove(e) {
  e.preventDefault();
  const touches = e.touches;

  if (touches.length === 1 && !state.isPanning) {
    if (!state.isDrawing) return;
    const t = touches[0];
    const pos = screenToCanvas(t.clientX, t.clientY);
    continueDraw(pos.x, pos.y);
  } else if (touches.length === 2) {
    const dist = getTouchDist(touches);
    const mid  = getTouchMid(touches);
    const rect = canvasArea.getBoundingClientRect();

    // Zoom
    const zoomFactor = dist / state.lastTouchDist;
    const newScale = Math.max(0.3, Math.min(5, state.scale * zoomFactor));

    // Point under mid should remain fixed
    const midInArea = { x: mid.x - rect.left, y: mid.y - rect.top };
    const cx = (midInArea.x - state.panX) / state.scale;
    const cy = (midInArea.y - state.panY) / state.scale;

    // Pan (finger drag)
    const dx = mid.x - state.lastTouchMid.x;
    const dy = mid.y - state.lastTouchMid.y;

    state.scale = newScale;
    state.panX = midInArea.x - cx * newScale + dx * 0;
    state.panY = midInArea.y - cy * newScale + dy * 0;

    // Also allow panning while pinching
    state.panX += mid.x - state.lastTouchMid.x;
    state.panY += mid.y - state.lastTouchMid.y;

    state.lastTouchDist = dist;
    state.lastTouchMid  = mid;
    applyTransform();
  }
}

function onTouchEnd(e) {
  e.preventDefault();
  if (e.touches.length === 0) {
    if (state.isDrawing) endDraw();
    state.isPanning = false;
  } else if (e.touches.length === 1) {
    state.isPanning = false;
    // Resume drawing with remaining finger
    const t = e.touches[0];
    const pos = screenToCanvas(t.clientX, t.clientY);
    startDraw(pos.x, pos.y);
  }
}

function getTouchDist(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx*dx + dy*dy);
}
function getTouchMid(touches) {
  return {
    x: (touches[0].clientX + touches[1].clientX) / 2,
    y: (touches[0].clientY + touches[1].clientY) / 2,
  };
}

// =============================================
// CORE DRAW LOGIC
// =============================================
// Store circle snapshot for preview
let _circleSnapshot = null;

function startDraw(x, y) {
  state.isDrawing = true;
  state.lastX = x;
  state.lastY = y;

  if (state.tool === 'circle') {
    state.circleStart = { x, y };
    _circleSnapshot = drawCtx.getImageData(0, 0, drawCanvas.width, drawCanvas.height);
  } else {
    // Pen / Eraser: start a dot
    drawCtx.beginPath();
    drawCtx.arc(x, y, state.size / 2, 0, Math.PI * 2);
    if (state.tool === 'eraser') {
      drawCtx.globalCompositeOperation = 'destination-out';
      drawCtx.fillStyle = 'rgba(0,0,0,1)';
    } else {
      drawCtx.globalCompositeOperation = 'source-over';
      drawCtx.fillStyle = state.color;
    }
    drawCtx.fill();
  }
}

function continueDraw(x, y) {
  if (!state.isDrawing) return;

  if (state.tool === 'circle') {
    // Restore snapshot then draw preview
    drawCtx.putImageData(_circleSnapshot, 0, 0);
    drawCircle(state.circleStart.x, state.circleStart.y, x, y, false);

  } else {
    // Pen / Eraser: smooth line
    drawCtx.beginPath();
    drawCtx.moveTo(state.lastX, state.lastY);
    drawCtx.lineTo(x, y);
    drawCtx.lineWidth   = state.size;
    drawCtx.lineCap     = 'round';
    drawCtx.lineJoin    = 'round';

    if (state.tool === 'eraser') {
      drawCtx.globalCompositeOperation = 'destination-out';
      drawCtx.strokeStyle = 'rgba(0,0,0,1)';
    } else {
      drawCtx.globalCompositeOperation = 'source-over';
      drawCtx.strokeStyle = state.color;
    }
    drawCtx.stroke();
  }

  state.lastX = x;
  state.lastY = y;
}

function endDraw() {
  if (!state.isDrawing) return;
  state.isDrawing = false;
  drawCtx.globalCompositeOperation = 'source-over';

  if (state.tool === 'circle' && state.circleStart) {
    drawCircle(state.circleStart.x, state.circleStart.y, state.lastX, state.lastY, true);
    state.circleStart = null;
    _circleSnapshot = null;
  }

  saveHistoryState();
}

// Draw circle from (x1,y1) to (x2,y2)
function drawCircle(x1, y1, x2, y2, save) {
  const cx = (x1 + x2) / 2;
  const cy = (y1 + y2) / 2;
  const rx = Math.abs(x2 - x1) / 2;
  const ry = Math.abs(y2 - y1) / 2;

  drawCtx.beginPath();
  drawCtx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
  drawCtx.strokeStyle = state.color;
  drawCtx.lineWidth   = state.size;
  drawCtx.lineCap     = 'round';
  drawCtx.globalCompositeOperation = 'source-over';
  drawCtx.stroke();
}

// =============================================
// HISTORY (UNDO/REDO)
// =============================================
function saveHistoryState() {
  // Trim redo branch
  state.history = state.history.slice(0, state.historyIndex + 1);
  const data = drawCtx.getImageData(0, 0, drawCanvas.width, drawCanvas.height);
  state.history.push(data);

  // No limit — keep all history
  state.historyIndex = state.history.length - 1;
  updateHistoryButtons();
}

function undo() {
  if (state.historyIndex <= 0) { showToast('⚠️ Không còn gì để Undo'); return; }
  state.historyIndex--;
  drawCtx.putImageData(state.history[state.historyIndex], 0, 0);
  updateHistoryButtons();
}

function redo() {
  if (state.historyIndex >= state.history.length - 1) { showToast('⚠️ Không còn gì để Redo'); return; }
  state.historyIndex++;
  drawCtx.putImageData(state.history[state.historyIndex], 0, 0);
  updateHistoryButtons();
}

function updateHistoryButtons() {
  document.getElementById('btn-undo').style.opacity = state.historyIndex > 0 ? '1' : '0.4';
  document.getElementById('btn-redo').style.opacity =
    state.historyIndex < state.history.length - 1 ? '1' : '0.4';
}

// =============================================
// CLEAR
// =============================================
function clearCanvas() {
  if (!confirm('Xóa toàn bộ nét vẽ?')) return;
  clearDrawCanvas();
  saveHistoryState();
  showToast('🗑️ Đã xóa toàn bộ');
}
function clearDrawCanvas() {
  drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
}

// =============================================
// SAVE IMAGE
// =============================================
function saveImage() {
  const merged = document.createElement('canvas');
  merged.width  = state.canvasW;
  merged.height = state.canvasH;
  const mCtx = merged.getContext('2d');
  mCtx.drawImage(bgCanvas, 0, 0);
  mCtx.drawImage(drawCanvas, 0, 0);

  const link = document.createElement('a');
  link.download = `exam_${Date.now()}.png`;
  link.href = merged.toDataURL('image/png');
  link.click();
  showToast('💾 Đã lưu ảnh!');
}

// =============================================
// LOCALSTORAGE
// =============================================
function saveToStorage() {
  try {
    // Save current draw canvas periodically
    const data = {
      canvasW: state.canvasW,
      canvasH: state.canvasH,
      drawData: drawCanvas.toDataURL(),
    };
    localStorage.setItem('examdraw_state', JSON.stringify(data));
  } catch(e) {}
}

// Auto-save every 30s
setInterval(() => {
  if (app.classList.contains('active')) saveToStorage();
}, 30000);

// =============================================
// GO HOME
// =============================================
function goHome() {
  if (!confirm('Tải đề mới? Bài làm chưa lưu sẽ mất.')) return;
  // Reset
  state.pdfDoc = null;
  pdfNav.classList.remove('visible');
  clearDrawCanvas();
  state.history = [];
  state.historyIndex = -1;
  bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
  fileInput.value = '';
  app.classList.remove('active');
  uploadScreen.style.display = 'flex';
}

// =============================================
// TOAST
// =============================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// =============================================
// INIT
// =============================================
checkOrientation();
updateHistoryButtons();
sizeSlider.value = state.size;

// Prevent context menu on long press
document.addEventListener('contextmenu', e => e.preventDefault());

// Handle window scroll prevention
document.addEventListener('touchmove', e => {
  if (e.target === drawCanvas || e.target === canvasArea) e.preventDefault();
}, { passive: false });

</script>
</body>
